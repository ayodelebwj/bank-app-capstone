name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: banking-app-capstone
  ECR_REPO: banking-app
  envsecret: ${{ secrets.POSTGRES_SECRET }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Login to ECR
      #- name: Login to Docker Hub
       # uses: aws-actions/amazon-ecr-login@v2

      # ✅ TEST CURRECT PWD
      - name: TEST CURRECT PWD
        run: |
          pwd
          ls -la

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_ID }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push Docker Image - Activity Service.....
      - name: Build and Push Image Activity Service
        run: |
          docker build -t olaniyikolawole744/activity-service:2.0 -f techbleat-global-bank-backend/activity-service/Dockerfile .
          docker login -u ${{ secrets.DOCKER_USER_ID }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push olaniyikolawole744/activity-service:2.0

      # ✅ Build & Push Docker Image - transaction Service
      - name: Build and Push Image Transaction Service
        run: |
          docker build -t olaniyikolawole744/transaction-service:2.0 -f techbleat-global-bank-backend/transaction-service/Dockerfile .
          docker login -u ${{ secrets.DOCKER_USER_ID }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push olaniyikolawole744/transaction-service:2.0

      # ✅ Build & Push Docker Image - user Service.
      - name: Build and Push Image User Service
        run: |
          docker build -t olaniyikolawole744/user-service:2.0 -f techbleat-global-bank-backend/user-service/Dockerfile .
          docker login -u ${{ secrets.DOCKER_USER_ID }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push olaniyikolawole744/user-service:2.0

      # ✅ Build & Push Docker Image - frontend Service.
      - name: Build and Push Image Frontend App
        run: |
          cd techbleat-global-bank-frontend
          rm -rf node_modules package-lock.json
          npm install 
          VITE_API_BASE=${{ secrets.VITE_API_BASE }} npm run build 
          ls -la
          docker build -t olaniyikolawole744/frontend-app:2.1 -f Dockerfile .
          docker login -u ${{ secrets.DOCKER_USER_ID }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push olaniyikolawole744/frontend-app:2.1


      # ✅ Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # ✅ Update kubeconfig....
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      # ✅ Deploy secret to Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/postgres-secret.yml

      # ✅ Deploy to postgres-configmap.yml
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/postgres-configmap.yml

      # ✅ create sql tables============================
      - name: create sql tables
        run: |
          kubectl create configmap postgres-init-sql --from-file=init.sql=k8s/init.sql



      # ✅ Deploy to postgres db to Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/statefulset-postgres.yml

      # ✅ Deploy Redis to Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deploymentredis.yml

      # ✅ Deploy user service to Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deploymentuser.yml

      # ✅ Deploy activity service to Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deploymentactivity.yml

      # ✅ Deploy transaction service to Kubernetes
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deploymenttransaction.yml

      # ✅ Deploy frontend app to Kubernetes...
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment-frontend.yml

       #✅ Remove cert-manager (if needed)
      - name: remove cert manager.........................
        run: |
          helm uninstall cert-manager -n cert-manager

      # ✅ Get Ingress Details           kubectl get ingress frontend-ingress -n default
      - name: Get Ingress Details
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.crds.yaml
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager --namespace cert-manager --create-namespace

      # ✅ Deploy configmap iceberg to Kubernetes
      - name: Apply configmap-iceberg.yaml Kubernetes manifests
        run: |
          kubectl apply -f k8s/configmap-iceberg.yml    
          
      # ✅ Deploy deployment flink to Kubernetes
      - name: Apply deployment flink.yaml Kubernetes manifests
        run: |
          kubectl apply -f k8s/deploymentflink.yml
      
      # ✅ Deploy statefulset kafka to Kubernetes
      - name: Apply statefulset-kafka.yaml Kubernetes manifests
        run: |
          kubectl apply -f k8s/statefulset-kafka.yml

      # ✅ Deploy cluster issuer to Kubernetes
      - name: Apply cluster-issuer.yaml Kubernetes manifests
        run: |
          kubectl apply -f k8s/cluster-issuer.yaml

      # ✅ Deploy certificate to Kubernetes.
      - name: Apply certificate.yaml Kubernetes manifests
        run: |
          kubectl apply -f k8s/certificate.yaml

          