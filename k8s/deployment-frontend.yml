apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  #VITE_ACTIVITY_SERVICE_URL: "https://www.lennipsss.org/api/activity"
  #VITE_USER_SERVICE_URL: "https://www.lennipsss.org/api/users"
  #VITE_TRANSACTION_SERVICE_URL: "https://www.lennipsss.org/api/transactions"
  VITE_API_BASE: "https://www.lennipsss.org/api"
  #VITE_ACTIVITY_SERVICE_URL: "http://activity-service:8001"
  #VITE_USER_SERVICE_URL: "http://user-service:8000"
  #VITE_TRANSACTION_SERVICE_URL: "http://transaction-service:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
        - name: frontend-app
          image: olaniyikolawole744/frontend-app:2.1
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-app
spec:
  selector:
    app: frontend-app
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.lennipsss.org
      secretName: app-tls-secret
  rules:
    - host: www.lennipsss.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-app
                port:
                  number: 80
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /api/transactions
            pathType: Prefix
            backend:
              service:
                name: transaction-service
                port:
                  number: 8080
          - path: /api/activity
            pathType: Prefix
            backend:
              service:
                name: activity-service
                port:
                  number: 8001