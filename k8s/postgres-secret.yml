apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: bankingdb
  POSTGRES_USER: bankuser
  POSTGRES_PASSWORD: bankpass
  POSTGRES_DATABASE_URL: postgresql://bankuser:bankpass@postgres:5432/bankingdb
  POSTGRES_SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankingdb


            